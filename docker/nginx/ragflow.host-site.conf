# Nginx su EC2 (sites-enabled): path host /ragflow/web/dist, proxy a 9380/8000.
# sgailegal.it → 301 verso home.sgailegal.com. Con EC2 spenta il redirect non può avvenire.

server {
    listen 80;
    server_name sgailegal.it www.sgailegal.it;
    return 301 https://home.sgailegal.com$request_uri;
}

server {
    listen 80;
    server_name sgailegal.com www.sgailegal.com app.sgailegal.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name sgailegal.it www.sgailegal.it;

    ssl_certificate     /etc/letsencrypt/live/sgailegal.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sgailegal.com/privkey.pem;

    return 301 https://home.sgailegal.com$request_uri;
}

server {
    listen 443 ssl;
    server_name sgailegal.com www.sgailegal.com app.sgailegal.com;
    root /ragflow/web/dist;

    ssl_certificate     /etc/letsencrypt/live/sgailegal.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sgailegal.com/privkey.pem;

    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types text/plain application/javascript text/css application/json image/svg+xml image/png image/jpeg;

    location ^~ /api/ {
        include /etc/nginx/proxy.conf;
        proxy_pass http://127.0.0.1:9380;
    }
    location ^~ /v1/ {
        include /etc/nginx/proxy.conf;
        proxy_pass http://127.0.0.1:9380;
    }

    location ^~ /oauth/ {
        include /etc/nginx/proxy.conf;
        proxy_redirect off;
        proxy_pass http://127.0.0.1:8000/;
    }

    location / {
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location ~ ^/static/(css|js|media)/ {
        expires 10y;
        access_log off;
    }
}
