#######################################################################
#  SGAI – React + Ragflow + OAuth Flask + Chat
#
#  sgailegal.it → 301 verso home.sgailegal.com. EC2 spenta = nessun redirect possibile.
#######################################################################

server {
    listen 80;
    server_name sgailegal.it www.sgailegal.it;
    return 301 https://home.sgailegal.com$request_uri;
}

server {
    listen 80;
    server_name sgailegal.com www.sgailegal.com app.sgailegal.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name sgailegal.it www.sgailegal.it;

    ssl_certificate     /etc/letsencrypt/live/sgailegal.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sgailegal.com/privkey.pem;

    return 301 https://home.sgailegal.com$request_uri;
}

server {
    listen 443 ssl;
    server_name sgailegal.com www.sgailegal.com app.sgailegal.com;

    ssl_certificate     /etc/letsencrypt/live/sgailegal.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sgailegal.com/privkey.pem;

    # GZIP
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types text/plain application/javascript text/css application/json image/svg+xml image/png image/jpeg;

    # Force revalidation for all static assets
    location ~* \.(css|js)$ {
        root /ragflow/web/dist;
        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        try_files $uri /index.html;
    }

    # SSE specifica con priorita massima
    location = /v1/canvas/completion {
        proxy_pass http://127.0.0.1:9380;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';

        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;
        add_header X-Accel-Buffering no always;

        proxy_connect_timeout 300s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;

        add_header Cache-Control 'no-cache' always;
    }

    # API principali
    location ^~ /api/ {
        include /etc/nginx/proxy.conf;
        proxy_pass http://127.0.0.1:9380;
    }

    location ^~ /v1/ {
        include /etc/nginx/proxy.conf;
        proxy_pass http://127.0.0.1:9380;
    }

    # Flow SPA routes (serve index.html for React Router)
    location ^~ /flow/ {
        root /ragflow/web/dist;
        index index.html;
        try_files $uri /index.html;

        add_header X-Frame-Options "" always;
        add_header Content-Security-Policy "frame-ancestors *;" always;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    # OAuth
    location ^~ /oauth/ {
        include /etc/nginx/proxy.conf;
        proxy_redirect off;
        proxy_pass http://ragflow-backend-oauth:8000/;
    }

    # CHAT SHARE
    location ^~ /chat/share {
        root /ragflow/web/dist;
        index index.html;
        try_files $uri /index.html;

        add_header X-Frame-Options "" always;
        add_header Content-Security-Policy "frame-ancestors *;" always;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    # SPA React - TUTTO IL RESTO
    location / {
        root /ragflow/web/dist;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
    }
}
